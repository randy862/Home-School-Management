<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigrader | Signup Status</title>
  <link rel="stylesheet" href="saas.css?v=202604171120">
</head>
<body>
  <main class="landing-shell signup-status-page">
    <header class="site-header">
      <a class="brand-lockup" href="/saas.html" aria-label="Navigrader Homeschool Records Management">
        <img class="brand-logo" src="assets/Mitchell_Logo.png" alt="Navigrader Homeschool Records Management">
      </a>
      <nav class="site-nav" aria-label="Signup status">
        <a href="/saas.html#pricing">Pricing</a>
        <a href="/saas.html#subscribe">Subscribe</a>
      </nav>
      <a class="header-cta" href="/saas.html#subscribe">Start Subscription</a>
    </header>

    <section class="status-shell status-shell-standalone" aria-live="polite">
      <div class="status-card">
        <p id="signup-status-kicker" class="eyebrow">Signup Status</p>
        <h1 id="signup-status-title">Looking up your hosted signup.</h1>
        <p id="signup-status-message" class="status-message">This page will track billing confirmation, provisioning progress, and hosted access handoff.</p>
        <div id="signup-status-details" class="status-details hidden"></div>
        <div id="signup-status-meta" class="compact-details status-meta hidden"></div>
        <div class="status-actions">
          <a class="primary-link" href="/saas.html#subscribe">Subscription Page</a>
          <a class="secondary-link" href="/saas.html#pricing">Back To Plans</a>
        </div>
      </div>
    </section>
  </main>
  <script src="signup-status.js?v=202604171120"></script>
</body>
</html>
