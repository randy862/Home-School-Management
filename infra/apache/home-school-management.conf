<VirtualHost *:80>
    ServerName 192.168.1.210
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/home-school-management/web
    DirectoryIndex index.html

    <Directory /var/www/home-school-management/web>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass /api/ http://192.168.1.200:3000/api/
    ProxyPassReverse /api/ http://192.168.1.200:3000/api/

    ProxyPass /health http://192.168.1.200:3000/health
    ProxyPassReverse /health http://192.168.1.200:3000/health

    ErrorLog ${APACHE_LOG_DIR}/home-school-management-error.log
    CustomLog ${APACHE_LOG_DIR}/home-school-management-access.log combined
</VirtualHost>
