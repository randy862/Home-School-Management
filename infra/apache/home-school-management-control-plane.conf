<IfModule mod_alias.c>
    Alias /control /var/www/home-school-management/control
    Alias /control/ /var/www/home-school-management/control/
</IfModule>

<Directory /var/www/home-school-management/control>
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

ProxyPass /control-api/ http://192.168.1.200:3100/
ProxyPassReverse /control-api/ http://192.168.1.200:3100/
